fetcher: requests
item_selector: a[href*="/articles/"]
link_selector: a[href*="/articles/"]
allowed_url_prefixes:
  - https://www.dta.gov.au/articles/
title_selectors:
  - h1
  - h2
date_selectors:
  - time[datetime]
  - time
content_selectors:
  - article
  - main
paragraph_selector: article p, main p, p
max_links: 25
timeout: 60
