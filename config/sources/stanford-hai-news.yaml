item_selector: article, div, a[href*="/news/"]
link_selector: a[href*="/news/"]
allowed_url_prefixes:
  - https://hai.stanford.edu/news/
excluded_url_substrings:
  - /topics/
  - /people/
  - /search
  - /subscribe
  - /events
title_selector: h1
title_selectors:
  - h3
  - h2
  - h1
  - a[href*="/news/"]
date_selectors:
  - time[datetime]
  - time
  - p
  - span
date_formats:
  - "%b %d, %Y"
  - "%B %d, %Y"
  - "%b %d %Y"
  - "%B %d %Y"
category_selectors:
  - '[class*="topic"]'
  - '[class*="category"]'
  - span
content_selectors:
  - article
  - main
paragraph_selector: article p, main p, p
max_links: 25