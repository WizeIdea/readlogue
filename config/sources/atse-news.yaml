fetcher: requests
item_selector: a[href*="/news/"]
link_selector: a[href*="/news/"]
allowed_url_prefixes:
  - https://www.atse.org.au/news/
title_selectors:
  - h1
date_selectors:
  - time[datetime]
  - time
content_selectors:
  - article
  - main
content_root_selector: main
paragraph_selector: article p, main p, p
max_links: 25
timeout: 60
