fetcher: requests
item_selector: a[href^="/news/"]
link_selector: a[href^="/news/"]
allowed_url_prefixes:
  - https://www.csail.mit.edu/news/
excluded_url_substrings:
  - /node/
title_selectors:
  - h1
  - h2
  - h3
date_selectors:
  - time[datetime]
  - time
  - span
date_formats:
  - "%B %d, %Y"
  - "%b %d, %Y"
content_selectors:
  - article
  - main
paragraph_selector: article p, main p, p
max_links: 25
