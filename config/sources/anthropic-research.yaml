fetcher: selenium
link_selector: a[href*="/research/"]
allowed_url_prefixes:
  - https://www.anthropic.com/research/
  - https://www.anthropic.com/news/
excluded_url_substrings:
  - /research/team/
  - /research/page/
title_selector: h1
content_selectors:
  - article
  - main
paragraph_selector: article p, main p, p
max_links: 25