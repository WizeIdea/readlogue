fetcher: requests
item_selector: a[href*="/s/redirect"]
link_selector: a[href*="/s/redirect"]
allowed_url_prefixes:
  - https://www.oaic.gov.au/news/blog/
title_selectors:
  - h1
date_selectors:
  - time[datetime]
  - time
content_selectors:
  - article
  - main
paragraph_selector: article p, main p, p
max_links: 25
timeout: 60
