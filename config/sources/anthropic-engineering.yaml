fetcher: requests
item_selector: a[href*="/engineering/"]
link_selector: a[href*="/engineering/"]
allowed_url_prefixes:
  - https://www.anthropic.com/engineering/
  - https://www.anthropic.com/news/
excluded_url_substrings:
  - /engineering/team/
  - /engineering/page/
  - /engineering?sort=
title_selector: h1
title_selectors:
  - h3
  - h2
  - h1
date_selectors:
  - time
  - p.detail-m
  - div[class*="date"]
  - span[class*="date"]
date_formats:
  - "%b %d, %Y"
  - "%B %d, %Y"
  - "%Y-%m-%d"
category_selectors:
  - span[class*="subject"]
  - span.caption.bold
  - span.text-label
  - p.detail-m
  - div[class*="category"]
content_selectors:
  - article
  - main
paragraph_selector: article p, main p, p
max_links: 25
content_clean:
  strip_leading_lines_matching:
    - '(?i)^##\s+Get the developer newsletter\s*$'
    - '(?i)^Product updates, how-tos, community spotlights, and more\. Delivered monthly to your inbox\.\s*$'