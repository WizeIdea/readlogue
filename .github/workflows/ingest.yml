name: ingest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    concurrency:
      group: reader-ingest
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Playwright browser
        run: playwright install chromium

      # Checkout the data repo for raw HTML storage
      - uses: actions/checkout@v4
        with:
          repository: WizeIdea/readlogue_data_2026
          path: data-repo
          ssh-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}

      - name: Run ingestion
        env:
          RAW_HTML_DIR: data-repo
        run: |
          python - <<'PY'
          import logging
          import os

          logging.basicConfig(level=logging.INFO, format="%(levelname)s %(name)s: %(message)s")

          from reader.ingest import ingest

          raw_dir = os.environ.get("RAW_HTML_DIR", "data-repo")
          ingest("config.example.yaml", raw_html_dir=raw_dir)
          PY

      - name: Backup database to data repo
        run: |
          python - <<'PY'
          import logging
          from pathlib import Path

          logging.basicConfig(level=logging.INFO, format="%(levelname)s %(name)s: %(message)s")

          from reader.db_backup import backup_database

          backup_database(
              Path("data/reader.db"),
              Path("data-repo/db_backups/daily"),
              Path("data-repo/db_backups/monthly"),
          )
          PY
          ls -la data-repo/db_backups/daily/ || true
          ls -la data-repo/db_backups/monthly/ || true

      - name: Commit and push database to main repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: ingest DB update"
          file_pattern: "data/reader.db"
          commit_user_name: readlogue-bot
          commit_user_email: bot@readlogue.local

      - name: Commit and push raw HTML and DB backups to data repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: ingest data repo update"
          file_pattern: 'raw_html/**/*.html db_backups/**/*.db'
          disable_globbing: true
          repository: data-repo
          commit_user_name: readlogue-bot
          commit_user_email: bot@readlogue.local