name: ingest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    concurrency:
      group: reader-ingest
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Install Playwright browser
        run: playwright install chromium
      - name: Run ingestion and exports
        run: |
          python - <<'PY'
          from reader.ingest import ingest
          from reader.export import export_datasets

          ingest("config.example.yaml")
          export_datasets("data/reader.db")
          PY