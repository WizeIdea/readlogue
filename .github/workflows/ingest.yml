name: ingest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    concurrency:
      group: reader-ingest
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Playwright browser
        run: playwright install chromium

      # Checkout the data repo for raw HTML storage
      - uses: actions/checkout@v4
        with:
          repository: WizeIdea/readlogue_data_2026
          path: data-repo
          ssh-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}

      - name: Run ingestion
        env:
          RAW_HTML_DIR: data-repo
        run: |
          python - <<'PY'
          from reader.ingest import ingest
          import os
          
          raw_dir = os.environ.get("RAW_HTML_DIR", "data-repo")
          ingest("config.example.yaml", raw_html_dir=raw_dir)
          PY

      - name: Commit and push raw HTML to data repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Ingested new raw HTML articles"
          repository: data-repo
          commit_user_name: readlogue-bot
          commit_user_email: bot@readlogue.local