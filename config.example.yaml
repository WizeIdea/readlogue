database: data/reader.db

# URLs skipped before fetch (no HTTP request, no validation). Substrings match anywhere in the normalized URL.
ignored_url_substrings:
  - introducing-google-antigravity

# Optional exact URLs (trailing slashes ignored):
# ignored_urls:
#   - https://www.anthropic.com/research/cyber-toolkits-update

# Stop re-fetching URLs after this many validation failures (default 3).
auto_skip_failure_threshold: 3

categories:
  - Technical Research
  - Research Digests
  - AI News
  - Governance and Policy
  - Safety and Alignment
  - Product Updates
  - Other
sources:
  # --- Next GHA run: batch 4 Governance and Policy + prior batch 3 sources ---
  - name: csail-news
    kind: listing
    url: https://www.csail.mit.edu/news/
    scraper: beautifulsoup
    config: config/sources/csail-news.yaml
    settings:
      default_category: Governance and Policy

  - name: oecd-ai-wonk
    kind: listing
    url: https://oecd.ai/en/wonk
    scraper: beautifulsoup
    config: config/sources/oecd-ai-wonk.yaml
    settings:
      default_category: Governance and Policy

  - name: partnership-on-ai-blog
    kind: rss
    url: https://partnershiponai.org/feed/
    scraper: rss
    settings:
      max_entries: 25
      default_category: Governance and Policy

  - name: ainow-publications
    kind: rss
    url: https://ainowinstitute.org/publications/feed
    scraper: rss
    settings:
      max_entries: 25
      default_category: Governance and Policy

  - name: eu-digital-strategy-news
    kind: listing
    url: https://digital-strategy.ec.europa.eu/en/news
    scraper: beautifulsoup
    config: config/sources/eu-digital-strategy-news.yaml
    settings:
      default_category: Governance and Policy

  - name: aisi-blog
    kind: rss
    url: https://raw.githubusercontent.com/alan-turing-institute/ai-rss-feeds/refs/heads/main/feeds/aisi-blog.xml
    scraper: rss
    config: config/sources/aisi-blog.yaml
    settings:
      max_entries: 25
      default_category: Governance and Policy

  - name: turing-blog
    kind: rss
    url: https://raw.githubusercontent.com/alan-turing-institute/ai-rss-feeds/refs/heads/main/feeds/turing-blog.xml
    scraper: rss
    settings:
      fetcher: playwright
      max_entries: 25
      default_category: Governance and Policy

  - name: the-batch
    kind: rss
    url: https://raw.githubusercontent.com/alan-turing-institute/ai-rss-feeds/refs/heads/main/feeds/the-batch.xml
    scraper: rss
    settings:
      fetcher: playwright
      max_entries: 25
      default_category: Research Digests

  # --- Tested OK — enable with next batch of new sources ---
  - name: anthropic-engineering
    kind: listing
    url: https://www.anthropic.com/engineering
    scraper: beautifulsoup
    enabled: false
