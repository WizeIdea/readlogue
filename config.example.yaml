database: data/reader.db

# URLs skipped before fetch (no HTTP request, no validation). Substrings match anywhere in the normalized URL.
ignored_url_substrings:
  - introducing-google-antigravity

# Optional exact URLs (trailing slashes ignored):
# ignored_urls:
#   - https://www.anthropic.com/research/cyber-toolkits-update

# Stop re-fetching URLs after this many validation failures (default 3).
auto_skip_failure_threshold: 3

categories:
  - Technical Research
  - Research Digests
  - AI News
  - Governance and Policy
  - Safety and Alignment
  - Product Updates
  - Other
sources:
  - name: huggingface-blog
    kind: rss
    url: https://huggingface.co/blog/feed.xml
    scraper: rss
    config: config/sources/huggingface-blog.yaml
    settings:
      max_entries: 25
      default_category: AI News

  - name: huggingface-ethics
    kind: api_tag
    url: https://huggingface.co/blog?tag=ethics
    scraper: requests
    config: config/sources/huggingface-ethics.yaml

  - name: huggingface-research
    kind: api_tag
    url: https://huggingface.co/blog?tag=research
    scraper: requests
    config: config/sources/huggingface-research.yaml

  - name: microsoft-research-blog
    kind: rss
    url: https://www.microsoft.com/en-us/research/blog/feed/
    scraper: rss
    settings:
      max_entries: 25
      default_category: Technical Research

  - name: deepmind-google-blog
    kind: rss
    url: https://deepmind.google/blog/rss.xml
    scraper: rss
    settings:
      max_entries: 25

  - name: openai-engineering
    kind: rss
    url: https://openai.com/news/engineering/rss.xml
    scraper: rss
    settings:
      max_entries: 25
      default_category: Technical Research

  - name: openai-news
    kind: rss
    url: https://openai.com/news/rss.xml
    scraper: rss
    settings:
      max_entries: 25
      default_category: AI News

  - name: importai
    kind: rss
    url: https://importai.substack.com/feed
    scraper: rss
    settings:
      max_entries: 25
      default_category: Research Digests

  - name: nist-news
    kind: rss
    url: https://www.nist.gov/news-events/news/rss.xml
    scraper: rss
    settings:
      max_entries: 25
      default_category: Governance and Policy

  - name: nist-it-news
    kind: rss
    url: https://www.nist.gov/news-events/information%20technology/rss.xml
    scraper: rss
    settings:
      max_entries: 25
      default_category: Governance and Policy

  - name: anthropic-research
    kind: listing
    url: https://www.anthropic.com/research
    scraper: beautifulsoup
    config: config/sources/anthropic-research.yaml

  - name: anthropic-engineering
    kind: listing
    url: https://www.anthropic.com/engineering
    scraper: beautifulsoup
    config: config/sources/anthropic-engineering.yaml

  - name: anthropic-news
    kind: listing
    url: https://www.anthropic.com/news
    scraper: beautifulsoup
    config: config/sources/anthropic-news.yaml

  - name: anthropic-frontier-red-team
    kind: listing
    url: https://www.anthropic.com/research/team/frontier-red-team
    scraper: beautifulsoup
    config: config/sources/anthropic-frontier-red-team.yaml

  - name: stanford-hai-news
    kind: listing
    url: https://hai.stanford.edu/news
    scraper: beautifulsoup
    config: config/sources/stanford-hai-news.yaml

  - name: bair-blog
    kind: listing
    url: https://bair.berkeley.edu/blog/
    scraper: requests
    config: config/sources/bair-blog.yaml