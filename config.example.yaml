database: data/reader.db
categories:
  - Technical Research
  - AI News
  - Governance and Policy
  - Safety and Alignment
  - Product Updates
  - Other
sources:
  - name: huggingface-ethics
    kind: api_tag
    url: https://huggingface.co/blog?tag=ethics
    scraper: requests
    config: config/sources/huggingface-ethics.yaml

  - name: huggingface-research
    kind: api_tag
    url: https://huggingface.co/blog?tag=research
    scraper: requests
    config: config/sources/huggingface-research.yaml

  - name: deepmind-google-blog
    kind: rss
    url: https://deepmind.google/blog/rss.xml
    scraper: rss

  - name: openai-engineering
    kind: rss
    url: https://openai.com/news/engineering/rss.xml
    scraper: rss

  - name: anthropic-research
    kind: listing
    url: https://www.anthropic.com/research
    scraper: beautifulsoup
    config: config/sources/anthropic-research.yaml

  - name: stanford-hai-news
    kind: listing
    url: https://hai.stanford.edu/news
    scraper: beautifulsoup
    config: config/sources/stanford-hai-news.yaml

  - name: bair-blog
    kind: listing
    url: https://bair.berkeley.edu/blog/
    scraper: requests
    config: config/sources/bair-blog.yaml