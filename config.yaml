# LIVE CONFIG — used by GitHub Actions ingest and local runs (not a template).
# After editing categories, article_types, article_domains, or sources (incl. display_name) below, run: python scripts/sync_web_vocab.py
database: data/reader.db

# URLs skipped before fetch (no HTTP request, no validation). Substrings match anywhere in the normalized URL.
ignored_url_substrings:
  - introducing-google-antigravity

# Optional exact URLs (trailing slashes ignored):
# ignored_urls:
#   - https://www.anthropic.com/research/cyber-toolkits-update

# Stop re-fetching URLs after this many validation failures (default 3).
auto_skip_failure_threshold: 3

categories:
  - Technical Research
  - News Digests
  - AI News
  - Vendor News
  - Governance and Policy
  - Product Updates
  - Education
  - Other

# Curation picklists (stored per-article in items.curation JSON; UI validates against these)
article_types:
  - research
  - news
  - governance
  - opinion

article_domains:
  - LLMs
  - optimisation
  - computer vision
  - RAG
  - agents
  - robotics
  - ethics
  - policy

sources:
  # Optional per source: display_name — label in the web UI sidebar (defaults to name)
